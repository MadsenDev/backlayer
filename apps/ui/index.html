<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backlayer</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1117;
      }

      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #0d1117;
        color: #e7edf5;
        font-family: "Segoe UI", "SF Pro Text", Inter, "Avenir Next", sans-serif;
      }

      .boot-shell {
        display: flex;
        height: 100%;
        padding: 12px;
        box-sizing: border-box;
      }

      .boot-panel {
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        border: 1px solid #263140;
        background: #121720;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .boot-card {
        width: min(420px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid #263140;
        background: #171d27;
        text-align: center;
        box-sizing: border-box;
      }

      .boot-spinner {
        width: 20px;
        height: 20px;
        margin: 0 auto 20px;
        border: 2px solid #6dbbab;
        border-top-color: transparent;
        border-radius: 999px;
        animation: boot-spin 0.8s linear infinite;
      }

      .boot-kicker {
        color: #6dbbab;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .boot-title {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .boot-copy {
        margin-top: 12px;
        color: #b6c0cf;
        font-size: 14px;
        line-height: 1.6;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-panel">
          <div class="boot-card">
            <div class="boot-spinner"></div>
            <div class="boot-kicker">Backlayer</div>
            <div class="boot-title">Starting manager</div>
            <div class="boot-copy">Loading the desktop UI and preparing the runtime connection.</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
